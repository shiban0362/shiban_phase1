<!DOCTYPE html>
<html>
<head>
<title>Box Model Example</title>
<style>

/* Body just for background */
body {
    background-color: #f0f0f0;
}

/* Box Model */
.box {
    width: 250px;
    
    /* CONTENT */
    background-color: lightblue;
    
    /* PADDING (inside space) */
    padding: 20px;
    
    /* BORDER */
    border: 5px solid black;
    
    /* MARGIN (outside space) */
    margin: 50px;
    
    font-family: Arial;
}

</style>
</head>
<body>

<div class="box">
    This is the content area.<br>
    Padding gives space inside.<br>
    Border surrounds the box.<br>
    Margin gives space outside.
</div>

</body>
</html>
